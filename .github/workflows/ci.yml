name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cosmos-version: ["3", "4"]
    name: check (cosmos v${{ matrix.cosmos-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Switch to @azure/cosmos v3
        if: matrix.cosmos-version == '3'
        run: npm install @azure/cosmos@3.17.2 --save-dev --no-audit --no-fund

      - name: Biome check
        run: npm run check

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Type tests
        run: npm run test:types

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: check
    services:
      cosmosdb:
        image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
        ports:
          - 8081:8081
          - 1234:1234
        env:
          AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
        options: >-
          --health-cmd "curl -fk https://localhost:8081/_explorer/emulator.pem"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for emulator
        run: |
          echo "Waiting for Cosmos DB emulator..."
          for i in $(seq 1 30); do
            if curl -fks https://localhost:8081/_explorer/emulator.pem > /dev/null 2>&1; then
              echo "Emulator is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 5
          done

      - name: Integration tests
        run: npm run test:integration
